name: Deploy Pixtrela Strapi to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Create deploy archive
        run: |
          tar --exclude=node_modules --exclude=.git --exclude=public/uploads \
            --exclude=db/mysql-data --exclude=.env --exclude=db/.env \
            -czf deploy.tgz .

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy.tgz
          target: /var/www/pixtrela/strapi/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 40m
          script: |
            cd /var/www/pixtrela/strapi/
            tar xzf deploy.tgz
            rm -f deploy.tgz
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
