name: Deploy Pixtrela Strapi to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 40m
          script: |
            cd /var/www/pixtrela/strapi/
            if [ -d temp_repo ]; then
              cd temp_repo && git pull && cd ..
            else
              git clone https://github.com/douglasjrosa/pixtrela-strapi.git temp_repo
            fi
            cp -r temp_repo/. .
            rm -rf temp_repo
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
